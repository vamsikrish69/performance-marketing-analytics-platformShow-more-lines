version: 2

models:
  - name: int_campaign_spend
    description: "Campaign-level spend, impressions, clicks, and CTR across Google Ads and Meta Ads."
    columns:
      - name: campaign_id
        tests:
          - not_null

      - name: campaign_name
        tests:
          - not_null

      - name: channel
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['google', 'meta']

      - name: total_spend
        tests:
          - not_null

      - name: total_impressions
        tests:
          - not_null

      - name: total_clicks
        tests:
          - not_null

  - name: int_campaign_conversions
    description: "Campaign-level conversion and revenue summary derived from customer conversion events."
    columns:
      - name: campaign_id
        tests:
          - not_null
          - unique

      - name: total_conversions
        tests:
          - not_null

      - name: converted_customers
        tests:
          - not_null

      - name: total_revenue
        tests:
          - not_null

  - name: int_customer_acquisition
    description: "Customer-level acquisition and conversion summary combining customer profile data with conversion behavior."
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

      - name: country
        tests:
          - not_null

      - name: device_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['mobile', 'desktop', 'tablet']

      - name: customer_conversion_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['converted', 'not_converted']

