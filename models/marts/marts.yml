version: 2

models:
  - name: fct_campaign_performance
    description: "Campaign-level performance mart combining ad spend, conversions, revenue, ROAS, CAC, ROI, and conversion rate."
    columns:
      - name: campaign_id
        tests:
          - not_null

      - name: campaign_name
        tests:
          - not_null

      - name: channel
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['google', 'meta']

      - name: total_spend
        tests:
          - not_null

      - name: total_revenue
        tests:
          - not_null

      - name: roas
        tests:
          - not_null

  - name: fct_channel_performance
    description: "Channel-level performance mart summarizing spend, revenue, conversions, ROAS, CAC, ROI, CTR, and conversion rate by marketing channel."
    columns:
      - name: channel
        tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: ['google', 'meta']

      - name: total_spend
        tests:
          - not_null

      - name: total_revenue
        tests:
          - not_null

      - name: channel_roas
        tests:
          - not_null

  - name: fct_customer_acquisition
    description: "Customer-level acquisition and conversion mart with customer revenue and value segmentation."
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

      - name: customer_conversion_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['converted', 'not_converted']

      - name: customer_value_segment
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['high_value_customer', 'medium_value_customer', 'low_value_customer', 'no_revenue']
